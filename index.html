// Fortnights are generated dynamically from this anchor (the very first period).
// Every fortnight is exactly 14 calendar days after the previous one.
const FORTNIGHT_ANCHOR = "2026-02-25";

const fmtFortnightLabel = (startStr) => {
  const days = getFortnight(startStr);
  const first = new Date(days[0] + "T12:00:00");
  const last  = new Date(days[days.length - 1] + "T12:00:00");
  const fmt   = (d) => d.toLocaleDateString("en-ZA", { day: "numeric", month: "short", year: "numeric" });
  return `${fmt(first)} – ${fmt(last)}`;
};

const generateFortnights = () => {
  const anchor  = new Date(FORTNIGHT_ANCHOR + "T12:00:00");
  const earliest = new Date(anchor); earliest.setFullYear(earliest.getFullYear() - 1);
  const latest   = new Date();       latest.setMonth(latest.getMonth() + 6);

  // Walk backwards to find first fortnight that begins before 'earliest'
  let cur = new Date(anchor);
  while (cur > earliest) cur.setDate(cur.getDate() - 14);
  cur.setDate(cur.getDate() + 14); // step back into range

  const list = [];
  while (cur <= latest) {
    const start = cur.toISOString().split("T")[0];
    list.push({ start, label: fmtFortnightLabel(start) });
    cur = new Date(cur); cur.setDate(cur.getDate() + 14);
  }
  return list;
};

// Returns the index of the fortnight that contains today (or the nearest past one).
const currentFortnightIdx = (list) => {
  const today = new Date().toISOString().split("T")[0];
  for (let i = list.length - 1; i >= 0; i--) {
    if (list[i].start <= today) return i;
  }
  return 0;
};

// Returns the fortnight object { start, label } that contains a given date string.
const getFortnightForDate = (dateStr) => {
  const list = generateFortnights();
  for (let i = list.length - 1; i >= 0; i--) {
    if (list[i].start <= dateStr) return list[i];
  }
  return list[0];
};

// HELPERS
// ─────────────────────────────────────────────────────────────────────────────
const pad2     = (n) => String(n).padStart(2, "0");
const todayStr = () => new Date().toISOString().split("T")[0];

const lunchMins = (v) => { if (v===true||v===0.5) return 30; if (v===1) return 60; return 0; };
const calcNetHours = (inT, outT, lunch) => {
  if (!inT || !outT) return 0;
  const [ih, im] = inT.split(":").map(Number);
  const [oh, om] = outT.split(":").map(Number);
  const mins = (oh * 60 + om) - (ih * 60 + im);
  if (mins <= 0) return 0;
  return Math.max(0, mins / 60 - lunchMins(lunch) / 60);
};

const fmtH = (h) => {
  if (!h) return "—";
  const hrs  = Math.floor(h);
  const mins = Math.round((h - hrs) * 60);
  return mins ? `${hrs}h ${pad2(mins)}m` : `${hrs}h`;
};

const fmtMoney = (v) =>
  v === 0 ? "—" : `R ${v.toLocaleString("en-ZA", { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;

const getFortnight = (startStr) => {
  const days = [];
  let d = new Date(startStr + "T12:00:00");
  while (days.length < 10) {
    if (d.getDay() >= 1 && d.getDay() <= 5) days.push(d.toISOString().split("T")[0]);
    d = new Date(d); d.setDate(d.getDate() + 1);
  }
  return days;
};

const ListManager = ({ items, setItems, placeholder, color = C.accent }) => {

    if (!v) return;
    if (items.some(i => i.toLowerCase() === v.toLowerCase())) { alert(`"${v}" already exists.`); return; }

  return (
    <div>

        <Inp
          placeholder={placeholder}
          value={newVal}

        />

const FortnightPicker = ({ fortnights, selectedStart, onChange, submissions }) => {
  const idx = fortnights.findIndex(f => f.start === selectedStart);
  const hasSubs = (start) => {
    const days = getFortnight(start);
    return submissions.some(s => days.includes(s.date));
  };
  const canPrev = idx > 0;
  const canNext = idx < fortnights.length - 1;

  const BtnStyle = (active) => ({
    padding: "9px 16px", background: active ? C.card : C.bg,
    border: `1.5px solid ${active ? C.border : C.border}`,
    borderRadius: 9, color: active ? C.text : C.border,
    cursor: active ? "pointer" : "default", fontSize: 18,
    fontFamily: "inherit", lineHeight: 1, flexShrink: 0,
  });

  return (
    <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
      <button style={BtnStyle(canPrev)} onClick={() => canPrev && onChange(fortnights[idx - 1].start)}>‹</button>

      <div style={{ flex: "1 1 260px" }}>
        <Sel value={selectedStart} onChange={e => onChange(e.target.value)}>
          {fortnights.map(fn => (
            <option key={fn.start} value={fn.start}>
              {hasSubs(fn.start) ? "● " : "○ "}{fn.label}
            </option>
          ))}
        </Sel>
      </div>

      <button style={BtnStyle(canNext)} onClick={() => canNext && onChange(fortnights[idx + 1].start)}>›</button>

      {hasSubs(selectedStart)
        ? <span style={{ fontSize: 11, color: C.green, fontWeight: 700, background: C.greenLt, padding: "5px 11px", borderRadius: 99, border: `1px solid ${C.green}33`, whiteSpace: "nowrap" }}>● Has data</span>

  );
};

const MemberPicker = ({ selected, onChange, exclude = [], permanent = [], casual = [], supervisors = [] }) => {

  const toggle = (n) => onChange(selected.includes(n) ? selected.filter(x => x !== n) : [...selected, n]);
  const allSel = allF.length > 0 && allF.every(w => selected.includes(w));

  const GroupBar = ({ label, color, pool }) => {

            </label>
          ))}
        </>}
        {fCas.length > 0 && <>
          <GroupBar label="General – Casual" color={C.purple} pool={fCas} />
          {fCas.map(n => (
            <label key={n} onClick={() => toggle(n)} style={{ display: "flex", alignItems: "center", gap: 12, padding: "13px 16px", cursor: "pointer", borderBottom: `1px solid ${C.border}`, background: selected.includes(n) ? C.purpleLt : "transparent" }}>

              <span style={{ fontSize: 15, color: C.text, fontWeight: selected.includes(n) ? 700 : 400 }}>{n}</span>

      {selected.length > 0 && (
        <div style={{ marginTop: 7, display: "flex", flexWrap: "wrap", gap: 4 }}>

        </div>
      )}
    </div>
  );
};

          {s.workers.length} worker{s.workers.length!==1?"s":""} selected{teamNetH>0?` · ${fmtH(teamNetH)} each`:""}
        </div>}
        {s.workers.length>0&&(
          <div style={{ marginTop:14 }}>
            <Lbl>Team Leader <span style={{ fontWeight:400, textTransform:"none", letterSpacing:0 }}>(optional — if someone other than the supervisor led the team)</span></Lbl>
            <div style={{ display:"flex", flexDirection:"column", gap:4, marginTop:6 }}>
              {s.workers.map(name=>(
                <button key={name} onClick={()=>upd("teamLeader", s.teamLeader===name?"":name)}
                  style={{ display:"flex", alignItems:"center", gap:10, padding:"10px 14px", background:s.teamLeader===name?C.goldLt:C.inputBg, border:`1.5px solid ${s.teamLeader===name?C.gold:C.border}`, borderRadius:9, cursor:"pointer", fontFamily:"inherit", textAlign:"left", transition:"all .15s" }}>
                  <span style={{ fontSize:17 }}>{s.teamLeader===name?"⭐":"☆"}</span>
                  <span style={{ fontSize:14, fontWeight:s.teamLeader===name?700:400, color:s.teamLeader===name?C.gold:C.text }}>{name}</span>
                  {s.teamLeader===name&&<span style={{ marginLeft:"auto", fontSize:10, fontWeight:800, color:C.gold, letterSpacing:.5 }}>TEAM LEADER</span>}
                </button>
              ))}
            </div>
          </div>
        )}
      </Card>

      <Card style={{ background:"#fffcf5", border:`1.5px solid ${C.gold}44` }}>
        <SecHead icon="🚐">Driver</SecHead>
        <div style={{ marginBottom: s.hasDriver?14:0 }}>
          <CheckRow checked={s.hasDriver} onChange={v=>upd("hasDriver",v)} label="A driver is part of this team today" color={C.gold} />
        </div>
        {s.hasDriver&&<>
          <div style={{ marginBottom:14 }}>
            <Lbl req>Driver Name</Lbl>
            <Sel value={s.driverName} onChange={e=>upd("driverName",e.target.value)}>
              <option value="">— Select driver —</option>
              {staff.drivers.map(d=><option key={d}>{d}</option>)}
            </Sel>
          </div>
          <div style={{ background:C.goldLt, borderRadius:10, padding:"12px 14px", marginBottom:12 }}>
            <div style={{ fontSize:11, fontWeight:700, color:C.gold, marginBottom:10 }}>DRIVER TIMES — leave blank to use team times above</div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, alignItems:"end", marginBottom:12 }}>
              <div><Lbl>Clock In</Lbl><Inp type="time" value={s.driverClockIn} onChange={e=>upd("driverClockIn",e.target.value)} /></div>
              <div><Lbl>Clock Out</Lbl><Inp type="time" value={s.driverClockOut} onChange={e=>upd("driverClockOut",e.target.value)} /></div>
            </div>
            <div>
              <Lbl>Waiting / Standing Time <span style={{ fontWeight:400, textTransform:"none", letterSpacing:0 }}>(deducted from driver hours)</span></Lbl>
              {s.driverWaitingPeriods.length>0&&(
                <div style={{ display:"flex", flexDirection:"column", gap:6, marginTop:6, marginBottom:8 }}>
                  {s.driverWaitingPeriods.map((mins,i)=>(
                    <div key={i} style={{ display:"flex", alignItems:"center", gap:8 }}>
                      <input type="number" min="1" max="480" value={mins||""} placeholder="mins"
                        onChange={e=>{ const v=parseInt(e.target.value)||0; const p=[...s.driverWaitingPeriods]; p[i]=v; upd("driverWaitingPeriods",p); }}
                        style={{ width:90, padding:"9px 12px", borderRadius:9, border:`1.5px solid ${C.gold}66`, background:"#fff", fontSize:15, color:C.text, fontFamily:"inherit", outline:"none", boxSizing:"border-box" }} />
                      <span style={{ fontSize:13, color:C.muted, fontWeight:600 }}>min</span>
                      <button onClick={()=>{ const p=s.driverWaitingPeriods.filter((_,di)=>di!==i); upd("driverWaitingPeriods",p); }}
                        style={{ background:"none", border:"none", color:C.muted, cursor:"pointer", fontSize:18, lineHeight:1, padding:"0 4px" }}>×</button>
                    </div>
                  ))}
                  {(()=>{ const total=s.driverWaitingPeriods.reduce((a,b)=>a+(b||0),0); return total>0&&(
                    <div style={{ fontSize:11, color:C.gold, fontWeight:700 }}>Total waiting: {total>=60?`${Math.floor(total/60)}h ${total%60>0?total%60+"m":""}`.trim():total+"m"} deducted</div>
                  ); })()}
                </div>
              )}
              <button onClick={()=>upd("driverWaitingPeriods",[...s.driverWaitingPeriods,0])}
                style={{ fontSize:12, fontWeight:700, color:C.gold, background:"none", border:`1.5px dashed ${C.gold}88`, borderRadius:8, padding:"6px 14px", cursor:"pointer", fontFamily:"inherit" }}>
                + Add waiting period
              </button>
            </div>
          </div>
          {s.driverDrops.map((dr,i)=>(
            <div key={i} style={{ background:"#fff", border:`1px solid ${C.gold}33`, borderRadius:9, padding:"10px 13px", marginBottom:10 }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                <span style={{ fontSize:11, fontWeight:800, color:C.gold }}>ADDITIONAL DROP #{i+1}</span>
                <button onClick={()=>rmDrop(i)} style={{ background:"none", border:"none", color:C.muted, cursor:"pointer", fontSize:18 }}>×</button>
              </div>
              <Inp placeholder="Label (e.g. Tokara – Team B)" value={dr.label} onChange={e=>updDrop(i,"label",e.target.value)} style={{ marginBottom:8 }} />
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, alignItems:"end" }}>
                <div><Lbl>Arrived</Lbl><Inp type="time" value={dr.clockIn} onChange={e=>updDrop(i,"clockIn",e.target.value)} /></div>
                <div><Lbl>Departed</Lbl><Inp type="time" value={dr.clockOut} onChange={e=>updDrop(i,"clockOut",e.target.value)} /></div>
              </div>
            </div>
          ))}
          <button onClick={addDrop} style={{ fontSize:12, fontWeight:700, color:C.gold, background:"none", border:`1.5px dashed ${C.gold}88`, borderRadius:8, padding:"6px 14px", cursor:"pointer", fontFamily:"inherit" }}>+ Add drop / second team</button>
        </>}
      </Card>

      <Card>
        <SecHead icon="📝">Notes</SecHead>
        <Textarea placeholder="Any additional notes — incidents, special instructions, partial shifts, etc." value={s.notes} onChange={e=>upd("notes",e.target.value)} />
      </Card>

      {errs.length>0&&<div style={{ background:"#fee2e2", border:"1px solid #fca5a5", borderRadius:10, padding:"10px 16px" }}>
        {errs.map((e,i)=><div key={i} style={{ fontSize:12, color:"#991b1b", fontWeight:600 }}>⚠ {e}</div>)}
      </div>}

      <div style={{ position:"sticky", bottom:0, background:C.bg, padding:"12px 0 8px", display:"flex", gap:10, justifyContent:"flex-end", zIndex:10 }}>
        {onCancel&&<button onClick={onCancel} style={{ padding:"14px 22px", background:"none", border:`1.5px solid ${C.border}`, borderRadius:12, color:C.muted, fontSize:14, fontWeight:700, cursor:"pointer", fontFamily:"inherit" }}>Cancel</button>}
        <button onClick={submit} disabled={disabled} style={{ flex:1, padding:"16px 28px", background:disabled?C.muted:C.accent, border:"none", borderRadius:12, color:"#fff", fontSize:16, fontWeight:900, cursor:disabled?"not-allowed":"pointer", fontFamily:"inherit", boxShadow:disabled?"none":`0 4px 14px ${C.accent}44`, opacity:disabled?0.7:1 }}>{submitLabel}</button>
      </div>
    </div>
  );
};

// ─────────────────────────────────────────────────────────────────────────────
// SUPERVISOR VIEW
// ─────────────────────────────────────────────────────────────────────────────
const SupervisorView = ({ onSubmit, submissions, onLogout, staff=DEFAULT_STAFF, estates=DEFAULT_ESTATES, workTypes=DEFAULT_WORK_TYPES }) => {
  const [selectedSupervisor, setSelectedSupervisor] = useState("");
  const [submitted, setSubmitted] = useState(false);
  const [submitting, setSubmitting] = useState(false);
  const [submitError, setSubmitError] = useState(null);
  const [lastSheet, setLastSheet] = useState(null);
  const mySubs = submissions.filter(s=>s.supervisor===selectedSupervisor);

  const handleSubmit = (sheet) => {
    setSubmitting(true);
    setSubmitError(null);
    onSubmit(sheet)
      .then(d => {
        if (d.ok) { setLastSheet(sheet); setSubmitted(true); }
        else { setSubmitError("Save failed: " + (d.error || "unknown error")); }
      })
      .catch(() => setSubmitError("No internet connection. Please check your signal and try again."))
      .finally(() => setSubmitting(false));
  };

  if (!selectedSupervisor) return (
    <div style={{ minHeight:"100vh", background:C.bg, fontFamily:"'Lato',system-ui,sans-serif" }}>
      <AppHeader role="supervisor" onLogout={onLogout} submissions={submissions} />
      <div style={{ maxWidth:480, margin:"60px auto", padding:"0 20px" }}>
        <Card>
          <SecHead icon="👷">Who are you?</SecHead>
          <p style={{ fontSize:13, color:C.muted, marginBottom:16 }}>Select your name to continue to the timesheet.</p>
          <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
            {staff.supervisors.map(sv=>(
              <button key={sv} onClick={()=>setSelectedSupervisor(sv)}
                style={{ padding:"13px 18px", background:C.card, border:`1.5px solid ${C.border}`, borderRadius:11, textAlign:"left", fontSize:14, fontWeight:700, color:C.text, cursor:"pointer", fontFamily:"inherit", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                {sv}<span style={{ color:C.accent, fontSize:18 }}>→</span>
              </button>
            ))}
          </div>
        </Card>
      </div>
    </div>
  );

  if (submitted&&lastSheet) {
    const netH = calcNetHours(lastSheet.clockIn,lastSheet.clockOut,lastSheet.lunchTaken);
    return (
      <div style={{ minHeight:"100vh", background:C.bg, fontFamily:"'Lato',system-ui,sans-serif" }}>
        <AppHeader role="supervisor" onLogout={onLogout} submissions={submissions} />
        <div style={{ maxWidth:520, margin:"60px auto", padding:"0 20px", textAlign:"center" }}>
          <div style={{ fontSize:60, marginBottom:16 }}>✅</div>
          <div style={{ fontFamily:"'Raleway',system-ui,sans-serif", fontSize:24, fontWeight:800, color:C.green, marginBottom:8 }}>Timesheet Submitted</div>
          <div style={{ color:C.muted, fontSize:14, marginBottom:24 }}>
            {lastSheet.date} · {lastSheet.estate} · {lastSheet.workType}<br/>
            {lastSheet.workers.length} worker{lastSheet.workers.length!==1?"s":""} · {fmtH(netH)} each
          </div>
          {lastSheet.notes&&<div style={{ background:C.goldLt, border:`1px solid ${C.gold}33`, borderRadius:10, padding:"10px 16px", fontSize:13, color:C.gold, marginBottom:24, textAlign:"left" }}><strong>Note:</strong> {lastSheet.notes}</div>}
          {mySubs.length>0&&<div style={{ marginBottom:20, textAlign:"left" }}>
            <div style={{ fontSize:12, fontWeight:700, color:C.muted, marginBottom:8 }}>YOUR SUBMISSIONS TODAY</div>
            {mySubs.map(s=><div key={s.id} style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:10, padding:"10px 14px", marginBottom:6, fontSize:13 }}><strong>{s.date}</strong> · {s.estate} · {s.workType} · {s.workers.length} workers</div>)}
          </div>}
          <div style={{ display:"flex", gap:10, justifyContent:"center" }}>
            <button onClick={()=>{setSubmitted(false);setLastSheet(null);}} style={{ padding:"11px 22px", background:C.accent, border:"none", borderRadius:11, color:"#fff", fontSize:14, fontWeight:800, cursor:"pointer", fontFamily:"inherit" }}>+ Submit Another</button>
            <button onClick={()=>setSelectedSupervisor("")} style={{ padding:"11px 22px", background:"none", border:`1.5px solid ${C.border}`, borderRadius:11, color:C.muted, fontSize:13, fontWeight:700, cursor:"pointer", fontFamily:"inherit" }}>Switch Supervisor</button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div style={{ minHeight:"100vh", background:C.bg, fontFamily:"'Lato',system-ui,sans-serif" }}>
      <AppHeader role="supervisor" onLogout={onLogout} supervisorName={selectedSupervisor} onSwitchSupervisor={()=>setSelectedSupervisor("")} submissions={submissions} />
      <div style={{ maxWidth:600, width:"100%", margin:"0 auto", padding:"16px 16px 100px", boxSizing:"border-box" }}>
        {submitError&&<div style={{ background:"#fee2e2", border:"1px solid #fca5a5", borderRadius:10, padding:"12px 16px", marginBottom:12, fontSize:13, color:"#991b1b", fontWeight:600 }}>⚠ {submitError}</div>}
        <TimesheetForm initial={emptySheet(selectedSupervisor)} onSubmit={handleSubmit} submitLabel={submitting?"Saving…":"Submit Timesheet ✓"} staff={staff} estates={estates} workTypes={workTypes} disabled={submitting} />
      </div>
    </div>
  );
};

// ─────────────────────────────────────────────────────────────────────────────
// PAYROLL SUMMARY  (uses fortnightStart string instead of an index)
// ─────────────────────────────────────────────────────────────────────────────
const PayrollSummary = ({ submissions, rates, fortnightStart, staff=DEFAULT_STAFF }) => {
  const { fnDays, dayLabels, personMap } = useMemo(() => {
    const days   = getFortnight(fortnightStart);
    const labels = days.map(ds => {
      const d = new Date(ds+"T12:00:00");
      return { date:ds, short: d.toLocaleDateString("en-ZA",{weekday:"short",day:"numeric",month:"short"}) };
    });
    const map = {};
    submissions.filter(s=>days.includes(s.date)).forEach(s=>{
      const teamH = calcNetHours(s.clockIn,s.clockOut,s.lunchTaken);
      const add = (name,role,h) => {
        if (!name||h<=0) return;
        if (!map[name]) map[name]={role,days:{}};
        map[name].days[s.date]=(map[name].days[s.date]||0)+h;
        const pri={supervisor:4,driver:3,permanent:2,casual:1};
        if ((pri[role]||0)>(pri[map[name].role]||0)) map[name].role=role;
      };
      if (s.supervisor) add(s.supervisor,"supervisor",teamH);
      if (s.hasDriver&&s.driverName){
        const dWaitH=(s.driverWaitingPeriods||[]).reduce((a,b)=>a+(b||0),0)/60;
        let dH=Math.max(0,calcNetHours(s.driverClockIn||s.clockIn,s.driverClockOut||s.clockOut,false)-dWaitH);
        s.driverDrops.forEach(dr=>{dH+=calcNetHours(dr.clockIn,dr.clockOut,false);});
        add(s.driverName,"driver",dH);
      }
      s.workers.forEach(w=>add(w,staff.permanent.includes(w)?"permanent":"casual",teamH));
    });
    return {fnDays:days,dayLabels:labels,personMap:map};
  },[submissions,fortnightStart,staff]);

  const people = Object.entries(personMap).sort((a,b)=>{
    const ro={supervisor:0,driver:1,permanent:2,casual:3};
    const ra=ro[a[1].role]??4, rb=ro[b[1].role]??4;
    return ra!==rb?ra-rb:a[0].localeCompare(b[0]);
  });

  const totals = people.map(([name,info])=>{
    const total=Object.values(info.days).reduce((s,h)=>s+h,0);
    const rate=rates[info.role]||0;
    return {name,role:info.role,days:info.days,total,wage:total*rate};
  });
  const grandTotal=totals.reduce((s,r)=>s+r.wage,0);

  const exportCSV=()=>{
    const header=["Name","Role",...dayLabels.map(d=>d.short),"Total Hours","Rate (R/hr)","Total Wage"];
    const rows=totals.map(r=>[r.name,ROLE_LABEL[r.role]||r.role,...fnDays.map(d=>r.days[d]?r.days[d].toFixed(2):""),r.total.toFixed(2),rates[r.role],r.wage.toFixed(2)]);
    rows.push(["TOTAL","",...fnDays.map(()=>""),"","",grandTotal.toFixed(2)]);
    const csv=[header,...rows].map(r=>r.map(v=>`"${v}"`).join(",")).join("\n");
    const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));a.download=`payroll_${fortnightStart}.csv`;a.click();
  };

  const fnLabel = fmtFortnightLabel(fortnightStart);

  if (people.length===0) return (
    <div style={{ textAlign:"center", padding:"50px 20px", color:C.muted }}>
      <div style={{ fontSize:40, marginBottom:10 }}>📊</div>
      <div style={{ fontWeight:700, fontSize:15 }}>No data for this fortnight</div>
      <div style={{ fontSize:13, marginTop:4 }}>Submit timesheets with dates in the {fnLabel} range.</div>
    </div>
  );

  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:16, flexWrap:"wrap", gap:10 }}>
        <div>
          <div style={{ fontFamily:"'Raleway',system-ui,sans-serif", fontSize:20, fontWeight:700, color:C.accent }}>Fortnightly Payroll</div>
          <div style={{ fontSize:12, color:C.muted, marginTop:2 }}>{fnLabel} · {people.length} people · {fmtMoney(grandTotal)} total</div>
        </div>
        <div style={{ display:"flex", gap:8 }}>
          <button onClick={exportCSV} style={{ padding:"8px 16px", background:C.accent, color:"#fff", border:"none", borderRadius:9, fontSize:12, fontWeight:700, cursor:"pointer", fontFamily:"inherit" }}>↓ Export CSV</button>
          <button onClick={()=>window.print()} style={{ padding:"8px 16px", background:C.goldLt, color:C.gold, border:`1px solid ${C.gold}44`, borderRadius:9, fontSize:12, fontWeight:700, cursor:"pointer", fontFamily:"inherit" }}>🖨 Print</button>
        </div>
      </div>
      <div style={{ display:"flex", gap:8, marginBottom:14, flexWrap:"wrap" }}>
        {Object.entries(ROLE_COLOR).map(([role,color])=>(
          <span key={role} style={{ background:color+"15", color, border:`1px solid ${color}33`, padding:"3px 11px", borderRadius:99, fontSize:11, fontWeight:700 }}>
            {ROLE_LABEL[role]}: R{rates[role]||0}/hr
          </span>
        ))}
      </div>
      <div style={{ overflowX:"auto", borderRadius:14, border:`1px solid ${C.border}`, boxShadow:"0 2px 8px rgba(42,26,14,.06)" }}>
        <table style={{ borderCollapse:"collapse", minWidth:860, width:"100%", fontSize:12 }}>
          <thead>
            <tr style={{ background:C.accent }}>
              <th style={{ padding:"11px 14px", textAlign:"left", color:"#fff", fontWeight:700, fontSize:11, letterSpacing:.5, whiteSpace:"nowrap", position:"sticky", left:0, background:C.accent, zIndex:2 }}>Name &amp; Role</th>
              {dayLabels.map(d=>(
                <th key={d.date} style={{ padding:"11px 8px", color:"#fff", fontWeight:700, fontSize:10, whiteSpace:"nowrap", textAlign:"center", minWidth:68, opacity:submissions.find(s=>s.date===d.date)?1:.45 }}>{d.short}</th>
              ))}
              <th style={{ padding:"11px 12px", color:"#fff", fontWeight:800, fontSize:11, textAlign:"center", background:"#5a1020", whiteSpace:"nowrap" }}>Total Hrs</th>
              <th style={{ padding:"11px 10px", color:"#fff", fontWeight:700, fontSize:11, textAlign:"center" }}>R/hr</th>
              <th style={{ padding:"11px 14px", color:C.goldLt, fontWeight:800, fontSize:11, textAlign:"right", background:"#5a1020", whiteSpace:"nowrap" }}>Wage Payable</th>
            </tr>
          </thead>
          <tbody>
            {totals.map((row,ri)=>{
              const rc=ROLE_COLOR[row.role]||C.muted;
              return (
                <tr key={row.name} style={{ background:ri%2===0?C.card:C.bg, borderTop:`1px solid ${C.border}` }}>
                  <td style={{ padding:"10px 14px", whiteSpace:"nowrap", position:"sticky", left:0, background:ri%2===0?C.card:C.bg, zIndex:1 }}>
                    <div style={{ fontWeight:700, fontSize:13, color:C.text }}>{row.name}</div>
                    <span style={{ fontSize:10, fontWeight:800, color:rc, letterSpacing:.5, textTransform:"uppercase" }}>{ROLE_LABEL[row.role]||row.role}</span>
                  </td>
                  {fnDays.map(d=>{const h=row.days[d];return<td key={d} style={{ padding:"10px 6px", textAlign:"center", color:h?C.text:"#ddd", fontWeight:h?700:400 }}>{h?fmtH(h):"·"}</td>;})}
                  <td style={{ padding:"10px 12px", textAlign:"center", fontWeight:900, color:C.accent, background:C.accentLt+"88" }}>{fmtH(row.total)}</td>
                  <td style={{ padding:"10px 10px", textAlign:"center", color:C.muted, fontWeight:600 }}>R{rates[row.role]}</td>
                  <td style={{ padding:"10px 14px", textAlign:"right", fontWeight:900, color:C.green, fontSize:13, background:C.greenLt+"88" }}>{fmtMoney(row.wage)}</td>
                </tr>
              );
            })}
          </tbody>
          <tfoot>
            <tr style={{ background:C.text, borderTop:`2px solid ${C.accent}` }}>
              <td style={{ padding:"12px 14px", fontWeight:900, color:"#fff", fontSize:13, position:"sticky", left:0, background:C.text }}>TOTALS</td>
              {fnDays.map(d=>{const h=totals.reduce((s,r)=>s+(r.days[d]||0),0);return<td key={d} style={{ padding:"12px 6px", textAlign:"center", color:h?C.goldLt:"#555", fontWeight:700, fontSize:11 }}>{h?fmtH(h):"·"}</td>;})}
              <td style={{ padding:"12px 12px", textAlign:"center", color:C.goldLt, fontWeight:900 }}>{fmtH(totals.reduce((s,r)=>s+r.total,0))}</td>
              <td></td>
              <td style={{ padding:"12px 14px", textAlign:"right", color:"#7ee8a2", fontWeight:900, fontSize:15 }}>{fmtMoney(grandTotal)}</td>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>
  );
};

const PrintPreview = ({ sheet, onClose, staff=DEFAULT_STAFF }) => {
  const netH    = calcNetHours(sheet.clockIn,sheet.clockOut,sheet.lunchTaken);
  const dWaitH=(sheet.driverWaitingPeriods||[]).reduce((a,b)=>a+(b||0),0)/60;
  const driverH = sheet.hasDriver?Math.max(0,calcNetHours(sheet.driverClockIn||sheet.clockIn,sheet.driverClockOut||sheet.clockOut,false)-dWaitH):0;
  return (
    <div style={{ position:"fixed", inset:0, background:"#fff", zIndex:9999, overflowY:"auto", fontFamily:"Georgia,serif" }}>
      <div className="no-print" style={{ position:"sticky", top:0, background:C.accent, color:"#fff", padding:"10px 24px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
        <span style={{ fontWeight:700 }}>Print Preview — {sheet.date}</span>
        <div style={{ display:"flex", gap:10 }}>
          <button onClick={()=>window.print()} style={{ padding:"7px 18px", background:"#fff", color:C.accent, border:"none", borderRadius:7, fontWeight:700, cursor:"pointer" }}>🖨 Print</button>
          <button onClick={onClose} style={{ padding:"7px 14px", background:"rgba(255,255,255,.2)", color:"#fff", border:"1px solid rgba(255,255,255,.4)", borderRadius:7, fontWeight:700, cursor:"pointer" }}>✕ Close</button>
        </div>
      </div>
      <div style={{ maxWidth:760, margin:"0 auto", padding:"32px 40px 50px" }}>

          <div><div style={{ fontFamily:"'Raleway',system-ui,sans-serif", fontSize:26, fontWeight:800, color:"#1e1433" }}>TIMESHEET</div><div style={{ fontSize:12, color:"#666", marginTop:2 }}>Wine Estate Labour Record</div></div>

const StaffManager = ({ staff, setStaff, sheetsUrl }) => {
  const [newName, setNewName] = useState("");
  const [newRole, setNewRole] = useState("permanent");
  const [confirm, setConfirm] = useState(null);

  const roleConfig = [
    { key:"supervisors", label:"Supervisors",       color:C.accent, icon:"👷" },
    { key:"drivers",     label:"Drivers",           color:C.gold,   icon:"🚐" },
    { key:"permanent",   label:"General - Permanent", color:C.green,  icon:"🟢" },
    { key:"casual",      label:"General - Casual",    color:C.purple, icon:"🔵" },
  ];

  const addPerson = () => {
    const name = newName.trim();
    if (!name) return;
    const all = [...staff.supervisors,...staff.drivers,...staff.permanent,...staff.casual];
    if (all.some(n=>n.toLowerCase()===name.toLowerCase())) { alert(`"${name}" already exists.`); return; }
    setStaff(prev=>({...prev,[newRole]:[...prev[newRole],name]}));
    setNewName("");
    // Write new member to Sheet Staff tab
    if (sheetsUrl) {
      const roleKey = newRole === "supervisors" ? "supervisor" : newRole === "drivers" ? "driver" : newRole;
      const form = new URLSearchParams({ data: JSON.stringify({ action: "addStaff", name, role: roleKey }) });
      fetch(sheetsUrl, { method: "POST", body: form }).catch(()=>{});
    }
  };

  const removePerson = (roleKey,name) => { setStaff(prev=>({...prev,[roleKey]:prev[roleKey].filter(n=>n!==name)})); setConfirm(null); };
  const moveRole = (name,from,to) => setStaff(prev=>({...prev,[from]:prev[from].filter(n=>n!==name),[to]:[...prev[to],name]}));
  const total = staff.supervisors.length+staff.drivers.length+staff.permanent.length+staff.casual.length;

  return (
    <div>
      <div style={{ background:C.greenLt, border:`1.5px solid ${C.green}44`, borderRadius:12, padding:"14px 16px", marginBottom:20 }}>
        <div style={{ fontSize:11, fontWeight:800, color:C.green, letterSpacing:1, marginBottom:10 }}>ADD NEW STAFF MEMBER</div>
        <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
          <Inp placeholder="Full name…" value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addPerson()} style={{ flex:"1 1 200px" }} />
          <Sel value={newRole} onChange={e=>setNewRole(e.target.value)} style={{ flex:"0 0 auto", width:"auto", minWidth:180 }}>
            <option value="supervisors">👷 Supervisor</option>
            <option value="drivers">🚐 Driver</option>
            <option value="permanent">🟢 General - Permanent</option>
            <option value="casual">🔵 General - Casual</option>
          </Sel>
          <button onClick={addPerson} style={{ padding:"9px 20px", background:C.green, color:"#fff", border:"none", borderRadius:9, fontSize:13, fontWeight:800, cursor:"pointer", fontFamily:"inherit", flexShrink:0 }}>+ Add</button>
        </div>
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(260px,1fr))", gap:14 }}>
        {roleConfig.map(({key,label,color,icon})=>(
          <div key={key} style={{ border:`1.5px solid ${color}33`, borderRadius:12, overflow:"hidden" }}>
            <div style={{ background:color+"18", borderBottom:`1.5px solid ${color}33`, padding:"10px 14px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
              <span style={{ fontWeight:800, fontSize:12, color, letterSpacing:.5 }}>{icon} {label.toUpperCase()}</span>
              <span style={{ background:color+"25", color, fontSize:11, fontWeight:800, padding:"2px 9px", borderRadius:99, border:`1px solid ${color}44` }}>{staff[key].length}</span>
            </div>
            <div style={{ maxHeight:240, overflowY:"auto", background:C.card }}>
              {staff[key].length===0
                ? <div style={{ padding:"16px 14px", textAlign:"center", color:C.muted, fontSize:12 }}>No {label.toLowerCase()} yet</div>
                : staff[key].map((name,i)=>(
                    <div key={name} style={{ display:"flex", alignItems:"center", padding:"8px 14px", borderBottom:i<staff[key].length-1?`1px solid ${C.border}`:"none", gap:8 }}>
                      <span style={{ flex:1, fontSize:13, color:C.text }}>{name}</span>
                      <select value={key} onChange={e=>moveRole(name,key,e.target.value)}
                        style={{ fontSize:10, padding:"3px 6px", borderRadius:6, border:`1px solid ${C.border}`, background:C.bg, color:C.muted, cursor:"pointer", fontFamily:"inherit" }} title="Move to role">
                        <option value="supervisors">👷 Sup</option>
                        <option value="drivers">🚐 Driver</option>
                        <option value="permanent">🟢 Gen-Perm</option>
                        <option value="casual">🔵 Gen-Cas</option>
                      </select>
                      {confirm===name
                        ? <div style={{ display:"flex", gap:4 }}>
                            <button onClick={()=>removePerson(key,name)} style={{ fontSize:10, padding:"3px 8px", background:"#fee2e2", color:"#991b1b", border:"1px solid #fca5a5", borderRadius:6, cursor:"pointer", fontWeight:700, fontFamily:"inherit" }}>Confirm</button>
                            <button onClick={()=>setConfirm(null)} style={{ fontSize:10, padding:"3px 8px", background:C.bg, color:C.muted, border:`1px solid ${C.border}`, borderRadius:6, cursor:"pointer", fontFamily:"inherit" }}>Cancel</button>
                          </div>
                        : <button onClick={()=>setConfirm(name)} style={{ fontSize:12, padding:"3px 9px", background:"none", color:"#f87171", border:"1px solid #fca5a599", borderRadius:6, cursor:"pointer", fontFamily:"inherit", fontWeight:700, flexShrink:0 }}>✕</button>
                      }
                    </div>
                  ))
              }
            </div>
          </div>
        ))}
      </div>
      <div style={{ marginTop:16, display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:8 }}>
        <span style={{ fontSize:12, color:C.muted }}>{total} total staff members</span>
        <button onClick={()=>{if(window.confirm("Reset all staff to the original defaults?"))setStaff(DEFAULT_STAFF);}}
          style={{ fontSize:11, padding:"6px 14px", background:"none", color:C.muted, border:`1px solid ${C.border}`, borderRadius:8, cursor:"pointer", fontFamily:"inherit" }}>
          Reset to defaults
        </button>
      </div>
    </div>
  );
};

const AdminView = ({ submissions, setSubmissions, rates, setRates, onLogout, staff, setStaff, estates, setEstates, workTypes, setWorkTypes, sheetsUrl, setSheetsUrl, syncAllToSheets, syncStatus }) => {
  const [tab, setTab]               = useState("submissions");
  const [editSheet, setEditSheet]   = useState(null);
  const [printSheet, setPrintSheet] = useState(null);
  const [sheetsInput, setSheetsInput] = useState(sheetsUrl);
  const [sheetsStatus, setSheetsStatus] = useState(null); // null | "testing" | "ok" | "err"

  // Dynamic fortnight list, computed once
  const allFortnights = useMemo(() => generateFortnights(), []);
  const defaultFnStart = useMemo(() => allFortnights[currentFortnightIdx(allFortnights)].start, [allFortnights]);
  const [selectedFn, setSelectedFn] = useState(defaultFnStart);

  const deleteSubmission = (id) => setSubmissions(p=>p.filter(s=>s.id!==id));

  const exportAllCSV = () => {
    const rows=[["ID","Date","Supervisor","Estate","Work Type","Clock In","Clock Out","Lunch","Workers","Driver","Driver In","Driver Out","Notes"]];
    submissions.forEach(s=>{rows.push([s.id.slice(0,8),s.date,s.supervisor,s.estate,s.workType,s.clockIn,s.clockOut,s.lunchTaken?"Yes":"No",s.workers.join("; "),s.driverName||"",s.driverClockIn||"",s.driverClockOut||"",s.notes||""]);});
    const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
    const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));a.download="all_submissions.csv";a.click();
  };

  const exportBackup = () => {
    const backup = { version:1, exportedAt:new Date().toISOString(), submissions, staff, estates, workTypes, rates };
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([JSON.stringify(backup,null,2)],{type:"application/json"}));
    a.download = `vinetime-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
  };

  const importBackup = () => {
    const input = document.createElement("input");
    input.type = "file";
    input.accept = ".json,application/json";
    input.onchange = e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const data = JSON.parse(ev.target.result);
          if (!data.version) throw new Error("Not a valid VineTime backup file.");
          const dated = data.exportedAt ? new Date(data.exportedAt).toLocaleString() : "unknown date";
          const subCount = (data.submissions||[]).length;
          if (!window.confirm(`Restore backup from ${dated}?\n\n${subCount} submission(s) found.\n\nThis will REPLACE all current data on this device.`)) return;
          if (data.submissions) setSubmissions(data.submissions);
          if (data.staff)       setStaff(data.staff);
          if (data.estates)     setEstates(data.estates);
          if (data.workTypes)   setWorkTypes(data.workTypes);
          if (data.rates)       setRates({...DEFAULT_RATES,...data.rates});
          alert("Backup restored successfully!");
        } catch(err) {
          alert("Error reading backup: " + err.message);
        }
      };
      reader.readAsText(file);
    };
    input.click();
  };

  return (
    <div style={{ minHeight:"100vh", background:C.bg, fontFamily:"'Lato',system-ui,sans-serif" }}>
      <style>{`@media print{.no-print{display:none!important}}@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}`}</style>
      <AppHeader role="admin" onLogout={onLogout} adminTab={tab} setAdminTab={setTab} submissions={submissions} />

      {syncStatus==="syncing" && (
        <div style={{ background:"#e8f3d8", color:"#3a5a1a", fontSize:12, fontWeight:600, padding:"8px 16px", textAlign:"center", borderBottom:"1px solid #d4e0b8" }}>
          ⟳ Syncing submissions from Google Sheets…
        </div>
      )}
      {syncStatus==="ok" && (
        <div style={{ background:"#e8f3d8", color:"#3a5a1a", fontSize:12, fontWeight:600, padding:"8px 16px", textAlign:"center", borderBottom:"1px solid #d4e0b8" }}>
          ✓ Synced from Google Sheets
        </div>
      )}
      {syncStatus==="error" && (
        <div style={{ background:"#fee2e2", color:"#991b1b", fontSize:12, fontWeight:600, padding:"8px 16px", textAlign:"center", borderBottom:"1px solid #fca5a5" }}>
          ⚠ Could not sync from Sheets — showing local data only
        </div>
      )}

      {printSheet&&<PrintPreview sheet={printSheet} onClose={()=>setPrintSheet(null)} staff={staff} />}
      {editSheet&&(
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.4)", zIndex:500, overflowY:"auto", padding:"30px 16px" }}>
          <div style={{ maxWidth:700, margin:"0 auto" }}>
            <div style={{ marginBottom:10, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <div style={{ fontFamily:"'Raleway',system-ui,sans-serif", color:"#fff", fontSize:18, fontWeight:700 }}>Edit Timesheet</div>
              <button onClick={()=>setEditSheet(null)} style={{ background:"rgba(255,255,255,.15)", border:"none", borderRadius:8, color:"#fff", padding:"6px 14px", fontWeight:700, cursor:"pointer", fontFamily:"inherit" }}>✕ Cancel</button>
            </div>
            <TimesheetForm initial={editSheet} isAdmin={true}
              onSubmit={(u)=>{setSubmissions(p=>p.map(s=>s.id===u.id?u:s));setEditSheet(null);}}
              onCancel={()=>setEditSheet(null)} submitLabel="Save Changes"
              staff={staff} estates={estates} workTypes={workTypes} />
          </div>
        </div>
      )}

      <div style={{ maxWidth:1000, margin:"0 auto", padding:"24px 16px 60px", animation:"fadeUp .3s ease" }}>

        {/* SUBMISSIONS TAB */}
        {tab==="submissions"&&(
          <div>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
              <div>
                <div style={{ fontFamily:"'Raleway',system-ui,sans-serif", fontSize:20, fontWeight:700, color:C.accent }}>All Submissions</div>
                <div style={{ fontSize:12, color:C.muted, marginTop:2 }}>{submissions.length} total</div>
              </div>
              <button onClick={exportAllCSV} style={{ padding:"8px 16px", background:C.goldLt, color:C.gold, border:`1px solid ${C.gold}44`, borderRadius:9, fontSize:12, fontWeight:700, cursor:"pointer", fontFamily:"inherit" }}>↓ Export CSV</button>
            </div>
            {submissions.length===0
              ? <div style={{ textAlign:"center", padding:"50px", color:C.muted }}>
                  <div style={{ fontSize:40, marginBottom:10 }}>📋</div>
                  <div style={{ fontWeight:700 }}>No submissions yet</div>
                  <div style={{ fontSize:13, marginTop:4 }}>Supervisors submit timesheets from the supervisor view.</div>
                </div>
              : <div style={{ display:"flex", flexDirection:"column", gap:28 }}>
                  {(()=>{
                    const sorted=[...submissions].sort((a,b)=>b.date.localeCompare(a.date));
                    const groups=[];
                    const seen={};
                    sorted.forEach(s=>{
                      const fn=getFortnightForDate(s.date);
                      if(!seen[fn.label]){seen[fn.label]=true;groups.push({label:fn.label,items:[]});}
                      groups.find(g=>g.label===fn.label).items.push(s);
                    });
                    return groups.map(group=>(
                      <div key={group.label}>
                        <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:12 }}>
                          <div style={{ background:C.accent, color:"#fff", borderRadius:8, padding:"3px 12px", fontSize:11, fontWeight:800, letterSpacing:.5, textTransform:"uppercase", whiteSpace:"nowrap" }}>{group.label}</div>
                          <div style={{ flex:1, height:1, background:C.border }} />
                          <div style={{ fontSize:11, color:C.muted, whiteSpace:"nowrap" }}>{group.items.length} submission{group.items.length!==1?"s":""}</div>
                        </div>
                        <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                          {group.items.map(s=>{
                            const netH=calcNetHours(s.clockIn,s.clockOut,s.lunchTaken);
                            const dWaitH=(s.driverWaitingPeriods||[]).reduce((a,b)=>a+(b||0),0)/60;
                            const driverH=s.hasDriver&&s.driverName&&s.driverClockIn&&s.driverClockOut?Math.max(0,calcNetHours(s.driverClockIn,s.driverClockOut,false)-dWaitH):null;
                            const dayName=s.date?new Date(s.date+"T12:00:00").toLocaleDateString("en-ZA",{weekday:"short"}):"";
                            return (
                              <Card key={s.id} style={{ padding:0, overflow:"hidden" }}>
                                <div style={{ height:4, background:"linear-gradient(90deg,"+C.accent+","+C.gold+")" }} />
                                <div style={{ padding:"14px 16px" }}>
                                  <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", gap:10, flexWrap:"wrap", marginBottom:12 }}>
                                    <div style={{ display:"flex", alignItems:"center", gap:10, flexWrap:"wrap" }}>
                                      <span style={{ fontFamily:"'Raleway',system-ui,sans-serif", fontWeight:900, fontSize:17, color:C.accent }}>{s.date}</span>
                                      <span style={{ fontSize:11, color:C.muted, fontWeight:600 }}>{dayName}</span>
                                      <Chip label={s.estate||"?"} color={C.muted} />
                                      <Chip label={s.workType||"?"} color={C.gold} />
                                    </div>
                                    <div style={{ display:"flex", gap:6, flexShrink:0 }}>
                                      <button onClick={()=>setEditSheet(s)} style={{ padding:"5px 11px", background:C.goldLt, border:"1px solid "+C.gold+"44", borderRadius:7, color:C.gold, fontSize:11, fontWeight:700, cursor:"pointer", fontFamily:"inherit" }}>✏ Edit</button>
                                      <button onClick={()=>setPrintSheet(s)} style={{ padding:"5px 11px", background:C.accentLt, border:"1px solid "+C.accent+"33", borderRadius:7, color:C.accent, fontSize:11, fontWeight:700, cursor:"pointer", fontFamily:"inherit" }}>🖨</button>
                                      <button onClick={()=>deleteSubmission(s.id)} style={{ padding:"5px 9px", background:"#fee2e2", border:"1px solid #fca5a5", borderRadius:7, color:"#991b1b", fontSize:11, fontWeight:700, cursor:"pointer" }}>✕</button>
                                    </div>
                                  </div>
                                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"12px 20px" }}>
                                    <div>
                                      <div style={{ fontSize:10, fontWeight:700, color:C.muted, textTransform:"uppercase", letterSpacing:.6, marginBottom:5 }}>Team Hours</div>
                                      <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
                                        <span style={{ fontFamily:"monospace", fontSize:15, fontWeight:700, color:"#1a1a1a" }}>{s.clockIn||"—"}</span>
                                        <span style={{ color:C.muted, fontSize:12 }}>{"→"}</span>
                                        <span style={{ fontFamily:"monospace", fontSize:15, fontWeight:700, color:"#1a1a1a" }}>{s.clockOut||"—"}</span>
                                        <span style={{ background:C.accentLt, color:C.accent, borderRadius:6, padding:"2px 8px", fontSize:11, fontWeight:800 }}>{fmtH(netH)}</span>
                                        {s.lunchTaken===1&&<span style={{ fontSize:10, color:C.muted }}>−1h lunch</span>}
                                        {(s.lunchTaken===0.5||s.lunchTaken===true)&&<span style={{ fontSize:10, color:C.muted }}>−30m lunch</span>}
                                      </div>
                                      <div style={{ marginTop:8, fontSize:11, color:C.muted }}><span style={{ fontWeight:700, color:"#333" }}>Supervisor:</span> {s.supervisor||"—"}</div>
                                      {s.teamLeader&&<div style={{ marginTop:4, fontSize:11, color:C.muted }}><span style={{ fontWeight:700, color:"#333" }}>⭐ Team Leader:</span> {s.teamLeader}</div>}
                                      {s.notes&&<div style={{ marginTop:8, fontSize:11, color:C.gold, background:C.goldLt, padding:"5px 10px", borderRadius:7, lineHeight:1.5 }}>{"📝 "+s.notes}</div>}
                                      <div style={{ marginTop:8, fontSize:10, color:C.border }}>Submitted: {s.submittedAt?new Date(s.submittedAt).toLocaleString("en-ZA"):"—"}</div>
                                    </div>
                                    <div>
                                      <div style={{ fontSize:10, fontWeight:700, color:C.muted, textTransform:"uppercase", letterSpacing:.6, marginBottom:5 }}>Team ({s.workers.length} worker{s.workers.length!==1?"s":""})</div>
                                      <div style={{ display:"flex", flexWrap:"wrap", gap:4 }}>
                                        {(s.workers||[]).map(w=><span key={w} style={{ background:"#f0f4e8", border:"1px solid #d4e0b8", color:"#3a5a1a", borderRadius:6, padding:"2px 9px", fontSize:11, fontWeight:600 }}>{w}</span>)}
                                        {s.workers.length===0&&<span style={{ color:C.muted, fontSize:11 }}>None listed</span>}
                                      </div>
                                      {s.hasDriver&&s.driverName&&(
                                        <div style={{ marginTop:10, padding:"8px 10px", background:"#fffbf0", border:"1px solid "+C.gold+"44", borderRadius:8 }}>
                                          <div style={{ fontSize:10, fontWeight:700, color:C.gold, textTransform:"uppercase", letterSpacing:.6, marginBottom:4 }}>🚐 Driver</div>
                                          <div style={{ fontSize:12, fontWeight:700, color:"#333", marginBottom:3 }}>{s.driverName}</div>
                                          {s.driverClockIn&&s.driverClockOut&&(
                                            <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                                              <span style={{ fontFamily:"monospace", fontSize:12, fontWeight:600 }}>{s.driverClockIn}</span>
                                              <span style={{ color:C.muted, fontSize:11 }}>{"→"}</span>
                                              <span style={{ fontFamily:"monospace", fontSize:12, fontWeight:600 }}>{s.driverClockOut}</span>
                                              {driverH!==null&&<span style={{ background:C.goldLt, color:C.gold, borderRadius:5, padding:"1px 7px", fontSize:10, fontWeight:800 }}>{fmtH(driverH)}</span>}
                                            </div>
                                          )}
                                        </div>
                                      )}
                                    </div>
                                  </div>
                                </div>
                              </Card>
                            );
                          })}
                        </div>
                      </div>
                    ));
                  })()}
                </div>
            }
          </div>
        )}

        {/* PAYROLL TAB */}
        {tab==="payroll"&&(
          <div>
            <div style={{ marginBottom:20 }}>
              <div style={{ fontFamily:"'Raleway',system-ui,sans-serif", fontSize:20, fontWeight:700, color:C.accent, marginBottom:12 }}>Fortnightly Payroll</div>
              <FortnightPicker fortnights={allFortnights} selectedStart={selectedFn} onChange={setSelectedFn} submissions={submissions} />
            </div>
            <PayrollSummary submissions={submissions} rates={rates} fortnightStart={selectedFn} staff={staff} />
          </div>
        )}

        {/* SETTINGS TAB */}
        {tab==="settings"&&(
          <div style={{ maxWidth:820 }}>
            <div style={{ fontFamily:"'Raleway',system-ui,sans-serif", fontSize:20, fontWeight:700, color:C.accent, marginBottom:20 }}>Settings</div>

            {/* Staff */}
            <Card style={{ marginBottom:16 }}>
              <SecHead icon="👥">Staff Management</SecHead>
              <p style={{ fontSize:12, color:C.muted, marginBottom:16, lineHeight:1.6 }}>Add or remove staff and assign roles. Saved to your browser and persists across sessions.</p>
              <StaffManager staff={staff} setStaff={setStaff} sheetsUrl={sheetsUrl} />
            </Card>

            {/* Estates */}
            <Card style={{ marginBottom:16 }}>
              <SecHead icon="🍇">Wine Estates</SecHead>
              <p style={{ fontSize:12, color:C.muted, marginBottom:14, lineHeight:1.6 }}>Estates shown in the timesheet dropdown. Removing an estate won't affect past submissions.</p>
              <ListManager items={estates} setItems={setEstates} placeholder="Estate name…" color={C.accent} />
              <div style={{ marginTop:12, textAlign:"right" }}>
                <button onClick={()=>{if(window.confirm("Reset estates to defaults?"))setEstates(DEFAULT_ESTATES);}}
                  style={{ fontSize:11, padding:"5px 12px", background:"none", color:C.muted, border:`1px solid ${C.border}`, borderRadius:7, cursor:"pointer", fontFamily:"inherit" }}>Reset to defaults</button>
              </div>
            </Card>

            {/* Work Types */}
            <Card style={{ marginBottom:16 }}>
              <SecHead icon="🔧">Work Types</SecHead>
              <p style={{ fontSize:12, color:C.muted, marginBottom:14, lineHeight:1.6 }}>Types of work shown in the timesheet dropdown.</p>
              <ListManager items={workTypes} setItems={setWorkTypes} placeholder="Work type…" color={C.gold} />
              <div style={{ marginTop:12, textAlign:"right" }}>
                <button onClick={()=>{if(window.confirm("Reset work types to defaults?"))setWorkTypes(DEFAULT_WORK_TYPES);}}
                  style={{ fontSize:11, padding:"5px 12px", background:"none", color:C.muted, border:`1px solid ${C.border}`, borderRadius:7, cursor:"pointer", fontFamily:"inherit" }}>Reset to defaults</button>
              </div>
            </Card>

            {/* Wages */}
            <Card style={{ marginBottom:16 }}>
              <SecHead icon="💰">Hourly Wage Rates (ZAR)</SecHead>
              {[["supervisor","Supervisor",C.accent],["driver","Driver",C.gold],["permanent","General – Permanent",C.green],["casual","General – Casual",C.purple]].map(([key,label,color])=>(
                <div key={key} style={{ marginBottom:16 }}>
                  <Lbl>{label}</Lbl>
                  <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                    <span style={{ fontWeight:800, fontSize:15, color }}>R</span>
                    <Inp type="number" min="0" step="0.50" value={rates[key]} onChange={e=>setRates(r=>({...r,[key]:parseFloat(e.target.value)||0}))}
                      style={{ fontWeight:800, fontSize:15, color, border:`1.5px solid ${color}55`, maxWidth:140 }} />
                    <span style={{ fontSize:12, color:C.muted }}>/ hour</span>
                  </div>
                </div>
              ))}
              <div style={{ background:C.goldLt, border:`1px solid ${C.gold}33`, borderRadius:9, padding:"10px 14px", marginTop:6 }}>
                <div style={{ fontSize:11, fontWeight:800, color:C.gold, marginBottom:8 }}>8-HOUR DAY PREVIEW</div>
                {[["supervisor","Supervisor"],["driver","Driver"],["permanent","General – Permanent"],["casual","General – Casual"]].map(([k,lb])=>(
                  <div key={k} style={{ fontSize:13, color:C.text, display:"flex", justifyContent:"space-between", marginBottom:4 }}>
                    <span>{lb}</span><strong>{fmtMoney((rates[k]||0)*8)}</strong>
                  </div>
                ))}
              </div>
            </Card>

            {/* Google Sheets Sync */}
            <Card style={{ marginBottom:16 }}>
              <SecHead icon="📊">Google Sheets Sync</SecHead>
              <p style={{ fontSize:12, color:C.muted, marginBottom:14, lineHeight:1.6 }}>
                Paste your Apps Script web app URL below. Every new submission will be sent to your Google Sheet automatically — and a payroll tab per fortnight will be created for you.
              </p>
              <Lbl>Apps Script Web App URL</Lbl>
              <div style={{ display:"flex", gap:8, marginBottom:10 }}>
                <Inp
                  type="url"
                  placeholder="https://script.google.com/macros/s/…/exec"
                  value={sheetsInput}
                  onChange={e=>setSheetsInput(e.target.value)}
                  style={{ flex:1, fontSize:12 }}
                />
                <button
                  onClick={()=>{ setSheetsUrl(sheetsInput); setSheetsStatus(null); }}
                  style={{ padding:"8px 14px", background:C.accent, color:"#fff", border:"none", borderRadius:9, fontSize:12, fontWeight:700, cursor:"pointer", fontFamily:"inherit", whiteSpace:"nowrap" }}>
                  Save URL
                </button>
              </div>
              {sheetsUrl && (
                <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:10 }}>
                  <button
                    onClick={async ()=>{
                      setSheetsStatus("testing");
                      try {
                        const res = await fetch(sheetsUrl);
                        const data = await res.json();
                        setSheetsStatus(data.status === "VineTime API OK" ? "ok" : "wrong");
                      } catch(err) {
                        setSheetsStatus(err.message && err.message.includes("NetworkError") ? "cors" : "err");
                      }
                    }}
                    style={{ padding:"7px 14px", background:C.goldLt, color:C.gold, border:`1px solid ${C.gold}44`, borderRadius:9, fontSize:12, fontWeight:700, cursor:"pointer", fontFamily:"inherit" }}>
                    {sheetsStatus==="testing" ? "Testing…" : "Test Connection"}
                  </button>
                  <button
                    onClick={async ()=>{
                      const n = syncAllToSheets();
                      if (!n) { alert("No submissions to sync."); return; }
                      alert(`Sending ${n} submission(s) to Google Sheets… check your Sheet in a few seconds.`);
                    }}
                    style={{ padding:"7px 14px", background:C.green, color:"#fff", border:"none", borderRadius:9, fontSize:12, fontWeight:700, cursor:"pointer", fontFamily:"inherit" }}>
                    ↑ Sync All Submissions Now
                  </button>
                  <button
                    onClick={async ()=>{
                      try {
                        const form = new URLSearchParams({ data: JSON.stringify({ action: "saveConfig", staff, rates }) });
                        const res = await fetch(sheetsUrl, { method: "POST", body: form });
                        const data = await res.json();
                        alert(data.ok ? "✅ Staff & rates saved to Google Sheets." : "❌ Error: " + data.error);
                      } catch(err) {
                        alert("❌ Failed to save: " + err.message);
                      }
                    }}
                    style={{ padding:"7px 14px", background:C.accent, color:"#fff", border:"none", borderRadius:9, fontSize:12, fontWeight:700, cursor:"pointer", fontFamily:"inherit" }}>
                    ↑ Save Staff & Rates to Cloud
                  </button>
                </div>
              )}
              {sheetsStatus==="ok"    && <div style={{ fontSize:12, color:C.green,      fontWeight:700 }}>✅ Script is live — VineTime API responding correctly.</div>}
              {sheetsStatus==="wrong" && <div style={{ fontSize:12, color:C.gold,       fontWeight:700 }}>⚠ URL responded but doesn't look like VineTime. Did you paste the right script?</div>}
              {sheetsStatus==="cors"  && <div style={{ fontSize:12, color:"#c0392b",    fontWeight:700 }}>❌ CORS error — in Apps Script deploy settings, set "Who has access" to <strong>Anyone</strong>.</div>}
              {sheetsStatus==="err"   && <div style={{ fontSize:12, color:"#c0392b",    fontWeight:700 }}>❌ URL not reachable — check the URL is correct and the script is deployed.</div>}
              {!sheetsUrl && (
                <div style={{ fontSize:12, color:C.muted, background:C.bg, borderRadius:8, padding:"10px 14px", lineHeight:1.6 }}>
                  No URL saved yet. Follow the setup guide to create your Apps Script and paste the URL above.
                </div>
              )}
            </Card>

            {/* Passwords */}
            <Card style={{ marginBottom:16 }}>
              <SecHead icon="🔐">Passwords</SecHead>
              <div style={{ fontSize:13, color:C.muted, lineHeight:1.7 }}>
                <p>Passwords are set in the source code at the top of the file:</p>
                <div style={{ background:C.bg, borderRadius:8, padding:"10px 14px", marginTop:8, fontFamily:"monospace", fontSize:12, color:C.text }}>
                  <div><span style={{ color:C.muted }}>ADMIN_PASSWORD</span> = <span style={{ color:C.green }}>"admin123"</span></div>
                  <div><span style={{ color:C.muted }}>SUPERVISOR_PASSWORD</span> = <span style={{ color:C.green }}>"vinetrak"</span></div>
                </div>
              </div>
            </Card>

            {/* Data Backup */}
            <Card>
              <SecHead icon="📦">Data Backup & Restore</SecHead>
              <p style={{ fontSize:12, color:C.muted, marginBottom:16, lineHeight:1.6 }}>
                Export all data — submissions, staff, estates, work types and rates — as a single JSON file. Use this to back up your records or transfer data to another device.
              </p>
              <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
                <button onClick={exportBackup}
                  style={{ padding:"10px 20px", background:C.green, color:"#fff", border:"none", borderRadius:9, fontSize:13, fontWeight:700, cursor:"pointer", fontFamily:"inherit" }}>
                  ↓ Export Backup (.json)
                </button>
                <button onClick={importBackup}
                  style={{ padding:"10px 20px", background:"none", color:C.accent, border:`1.5px solid ${C.accent}`, borderRadius:9, fontSize:13, fontWeight:700, cursor:"pointer", fontFamily:"inherit" }}>
                  ↑ Restore from Backup
                </button>
              </div>
              <div style={{ marginTop:14, background:C.goldLt, border:`1px solid ${C.gold}33`, borderRadius:9, padding:"10px 14px", fontSize:12, color:C.gold, lineHeight:1.6 }}>
                ⚠ Restoring a backup will <strong>replace all current data</strong> on this device. Export first if you want to keep a copy.
              </div>
            </Card>
          </div>
        )}
      </div>
    </div>
  );
};

// ─────────────────────────────────────────────────────────────────────────────
// ROOT
// ─────────────────────────────────────────────────────────────────────────────
function App() {
  const [role, setRole] = useState(null);

  const [submissions, setSubmissions] = useState([]);

  const [rates, setRatesRaw] = useState(() => {
    try { const s=localStorage.getItem("vine_rates"); return s?{...DEFAULT_RATES,...JSON.parse(s)}:DEFAULT_RATES; } catch{return DEFAULT_RATES;}
  });
  const setRates = (u) => setRatesRaw(prev=>{
    const next=typeof u==="function"?u(prev):u;
    try{localStorage.setItem("vine_rates",JSON.stringify(next));}catch{}
    return next;
  });

  const [staff, setStaffRaw] = useState(() => {
    try { const s=localStorage.getItem("vine_staff"); return s?JSON.parse(s):DEFAULT_STAFF; } catch{return DEFAULT_STAFF;}
  });
  const setStaff = (u) => setStaffRaw(prev=>{
    const next=typeof u==="function"?u(prev):u;
    try{localStorage.setItem("vine_staff",JSON.stringify(next));}catch{}
    return next;
  });

  const [estates, setEstatesRaw] = useState(() => {
    try { const s=localStorage.getItem("vine_estates"); return s?JSON.parse(s):DEFAULT_ESTATES; } catch{return DEFAULT_ESTATES;}
  });
  const setEstates = (u) => setEstatesRaw(prev=>{
    const next=typeof u==="function"?u(prev):u;
    try{localStorage.setItem("vine_estates",JSON.stringify(next));}catch{}
    return next;
  });

  const [workTypes, setWorkTypesRaw] = useState(() => {
    try { const s=localStorage.getItem("vine_work_types"); return s?JSON.parse(s):DEFAULT_WORK_TYPES; } catch{return DEFAULT_WORK_TYPES;}
  });
  const setWorkTypes = (u) => setWorkTypesRaw(prev=>{
    const next=typeof u==="function"?u(prev):u;
    try{localStorage.setItem("vine_work_types",JSON.stringify(next));}catch{}
    return next;
  });

  // Google Sheets sync URL (set in Admin → Settings)
  const HARDCODED_URL = "https://script.google.com/macros/s/AKfycbz1CCuhh0JDyQn3cdpGjH_dgijdkoc4HFHaEoi0E_6SBqjvsTHt2xRDZB0Dn8gfTl6h/exec";
  const [sheetsUrl, setSheetsUrlRaw] = useState(() => {
    try { return localStorage.getItem("vine_sheets_url") || HARDCODED_URL; } catch { return HARDCODED_URL; }
  });
  const setSheetsUrl = (v) => {
    setSheetsUrlRaw(v || HARDCODED_URL);
    try { localStorage.setItem("vine_sheets_url", v || HARDCODED_URL); } catch {}
  };

  const [syncStatus, setSyncStatus] = useState(null); // null | "syncing" | "ok" | "error"

  // Sheet is the single source of truth for submissions — fetch on every login
  React.useEffect(() => {
    if (role !== "admin" || !sheetsUrl) return;
    setSyncStatus("syncing");
    fetch(sheetsUrl + "?action=submissions")
      .then(r => r.json())
      .then(data => {
        setSubmissions(data.ok && Array.isArray(data.submissions) ? data.submissions : []);
        setSyncStatus("ok");
      })
      .catch(() => setSyncStatus("error"));
  }, [role, sheetsUrl]);

  // Fetch staff, rates + estates from Sheet on every login
  React.useEffect(() => {
    if (!sheetsUrl) return;
    Promise.all([
      fetch(sheetsUrl + "?action=staff").then(r=>r.json()).catch(()=>null),
      fetch(sheetsUrl + "?action=rates").then(r=>r.json()).catch(()=>null),
      fetch(sheetsUrl + "?action=estates").then(r=>r.json()).catch(()=>null),
    ]).then(function([staffData, ratesData, estatesData]) {
      if (staffData && staffData.ok && staffData.staff) {
        setStaffRaw(staffData.staff);
        try{localStorage.setItem("vine_staff",JSON.stringify(staffData.staff));}catch{}
      }
      if (ratesData && ratesData.ok && ratesData.rates) {
        setRatesRaw(prev=>({...prev,...ratesData.rates}));
        try{localStorage.setItem("vine_rates",JSON.stringify(ratesData.rates));}catch{}
      }
      if (estatesData && estatesData.ok && estatesData.estates) {
        setEstatesRaw(estatesData.estates);
        try{localStorage.setItem("vine_estates",JSON.stringify(estatesData.estates));}catch{}
      }
    });
  }, [role, sheetsUrl]);

  // POST a submission to Sheets — returns a promise so caller can handle success/failure
  const postToSheets = (sheet) => {
    const fn = getFortnightForDate(sheet.date);
    const payload = {
      submission: sheet,
      fortnightLabel: fn.label,
      fortnightStart: fn.start,
      rates,
      permanentWorkers: (staff && staff.permanent) ? staff.permanent : [],
      staff
    };
    const form = new URLSearchParams({ data: JSON.stringify(payload) });
    return fetch(sheetsUrl, { method: "POST", body: form }).then(r => r.json());
  };

  const syncAllToSheets = (url) => { return 0; }; // kept for Settings UI compatibility

  if (!role) return <LoginScreen onLogin={setRole} />;

  if (role==="supervisor") return (
    <SupervisorView
      onSubmit={(sheet) => postToSheets(sheet)}
      submissions={submissions}
      onLogout={()=>setRole(null)}
      staff={staff}
      estates={estates}
      workTypes={workTypes}
    />
  );

  return (
    <AdminView
      submissions={submissions} setSubmissions={setSubmissions}
      rates={rates} setRates={setRates}
      onLogout={()=>setRole(null)}
      staff={staff} setStaff={setStaff}
      estates={estates} setEstates={setEstates}
      workTypes={workTypes} setWorkTypes={setWorkTypes}
      sheetsUrl={sheetsUrl} setSheetsUrl={setSheetsUrl}
      syncAllToSheets={syncAllToSheets}
      syncStatus={syncStatus}
    />
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

  //   });
  // }
</script>
</body>
